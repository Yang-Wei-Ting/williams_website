{% extends "registration/base.html" %}

{% block title %}
  Sign Up
{% endblock title %}

{% block login_or_signup %}
  <form action="{% url 'signup' %}" method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="form-control" required autofocus>
    <input type="password" name="password" placeholder="Password" class="form-control" required>
    <input type="submit" value="Sign Up" class="w-100 btn btn-primary mt-2">
  </form>

  <p class="text-muted smaller mt-4 mb-0">
    <a href="{% url 'login' %}">Login</a> if you already have an account.
  </p>
{% endblock login_or_signup %}
